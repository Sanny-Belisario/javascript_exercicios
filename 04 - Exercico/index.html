<script>
    let numeros=[]
    for(i=0; i<100; i++){
        if(i%2==1){
            numeros.push(i)
        }
    }

    for(i=0; i<numeros.length; i++){
        if(numeros[i]%7==0){
            console.log("*"+numeros[i])
        }else{
            console.log(numeros[i])
        }
    }
</script>
